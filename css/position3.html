<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position3</title>
</head>
<body>
  <div class="wrap">
     <div class="thumb">
      <img src="images/test-img.png" alt="">
      <span class="like">좋아요</span>
      <span class="sale-box">10%</span>
     </div>
  </div>
  <style>
    *{margin:0; padding: 0;}
    .wrap{
      margin:100px 50px;
      background-color: #cc0;
    }
    .thumb{
      background-color: #ddd;
    }
    .thumb .like{
      background-color: #86f;
    }
    .thumb .sale-box{ 
      background-color: #f68;
    }

    /* 좋아요, 10% 요소의 크기를 w 50px h50px */
    .thumb span{ width:50px; height: 50px;}
    /* span 인라인 너버.높이 지정하지 못했던 문제 해결 */
    .thumb span{display: block;}
    /* 좋아요, 세일박스를 위치를 지정 
    left/right/top/bottom
    postion:
      relative, absolute, fixed
    */
    .thumb span{
      position:absolute;
    }
     /* 가까운 조상중에 position(static제외한)이 설정되어 있는 요소 기준을 지정 */
     .thumb{
      position: relative;
     }
  </style>
</body>
</html>
